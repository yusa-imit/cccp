name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            artifact: cccp-inbox-darwin-arm64
          - target: darwin-x64
            artifact: cccp-inbox-darwin-x64
          - target: linux-x64
            artifact: cccp-inbox-linux-x64
          - target: linux-arm64
            artifact: cccp-inbox-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Compile single-file binary
        working-directory: server
        run: |
          bun build \
            --compile \
            --minify \
            --sourcemap \
            --target=bun-${{ matrix.target }} \
            inbox.ts \
            --outfile dist/${{ matrix.artifact }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: server/dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Lay out release assets
        run: |
          mkdir -p release
          for d in artifacts/*/; do
            name=$(basename "$d")
            cp "$d/$name" "release/$name"
            chmod +x "release/$name"
          done
          (cd release && sha256sum cccp-inbox-* > SHA256SUMS)
          ls -la release/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release/cccp-inbox-darwin-arm64
            release/cccp-inbox-darwin-x64
            release/cccp-inbox-linux-x64
            release/cccp-inbox-linux-arm64
            release/SHA256SUMS
